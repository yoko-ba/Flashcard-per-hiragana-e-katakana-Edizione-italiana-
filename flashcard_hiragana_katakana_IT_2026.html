<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひらがな・カタカナ フラッシュカード — Edizione Italiana 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Serif+JP:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --ink: #1a1714;
  --paper: #faf8f4;
  --cream: #f0ece3;
  --red: #c0392b;
  --red-soft: #e8d0cd;
  --gold: #b8860b;
  --grey: #8a8480;
  --border: #d4cfc7;
  --card-bg: #ffffff;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(0,0,0,0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: var(--paper);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  border-bottom: 3px solid var(--red);
}

.header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: .04em;
  line-height: 1.3;
}
.header-title span { font-size: .75rem; color: #bbb; display: block; font-family: 'Cormorant Garamond', serif; font-style: italic; }

.header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.btn {
  font-family: 'Space Mono', monospace;
  font-size: .7rem;
  letter-spacing: .06em;
  border: 1.5px solid currentColor;
  background: transparent;
  color: var(--paper);
  padding: 5px 12px;
  cursor: pointer;
  border-radius: 2px;
  transition: background .18s, color .18s;
  text-transform: uppercase;
}
.btn:hover { background: var(--paper); color: var(--ink); }
.btn.active { background: var(--red); border-color: var(--red); color: #fff; }
.btn.gold { color: var(--gold); border-color: var(--gold); }
.btn.gold:hover { background: var(--gold); color: #fff; }
.btn-icon { font-size: .9rem; padding: 5px 9px; }

/* ── FILTER ROW ── */
.filter-row {
  background: var(--cream);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-label {
  font-family: 'Space Mono', monospace;
  font-size: .65rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--grey);
  margin-right: 4px;
}
.filter-btn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .8rem;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 3px 10px;
  cursor: pointer;
  border-radius: 2px;
  transition: all .15s;
}
.filter-btn:hover { border-color: var(--red); color: var(--red); }
.filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

/* ── PROGRESS ── */
.progress-bar-wrap {
  background: var(--cream);
  padding: 8px 28px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--red); border-radius: 2px; transition: width .3s; }
.progress-label { font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--grey); white-space: nowrap; }

/* ── MAIN LAYOUT ── */
.main-wrap { display: flex; gap: 0; }

/* ── DIFFICULT PANEL ── */
.difficult-panel {
  width: 220px;
  min-width: 220px;
  background: var(--card-bg);
  border-right: 1px solid var(--border);
  display: none;
  flex-direction: column;
  max-height: calc(100vh - 130px);
  position: sticky;
  top: 0;
}
.difficult-panel.open { display: flex; }
.panel-header {
  padding: 12px 14px;
  background: var(--cream);
  border-bottom: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: .68rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--grey);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-list { overflow-y: auto; padding: 8px 0; flex: 1; }
.panel-item {
  padding: 7px 14px;
  display: flex;
  gap: 10px;
  align-items: center;
  cursor: pointer;
  transition: background .15s;
  border-bottom: 1px solid var(--cream);
}
.panel-item:hover { background: var(--cream); }
.panel-kana { font-family: 'Noto Serif JP', serif; font-size: 1.4rem; }
.panel-roma { font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--grey); }

/* ── CARD AREA ── */
.card-area {
  flex: 1;
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  min-height: calc(100vh - 130px);
}

.card-wrapper {
  perspective: 1000px;
  width: 340px;
  max-width: 100%;
  height: 420px;
}

.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-back { transform: rotateY(180deg); }

/* FRONT */
.card-front-top {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}
.card-svg-wrap {
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-svg-wrap img, .card-svg-wrap svg {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.card-front-bottom { display: none; }
.card-sound-btn { display: none; }
.card-romaji { display: none; }
.card-stroke-info { display: none; }

.difficult-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: transparent;
  border: none;
  font-size: 1.1rem;
  cursor: pointer;
  z-index: 10;
  transition: transform .2s;
}
.difficult-btn:hover { transform: scale(1.3); }

/* BACK */
.card-back .card-face-inner {
  padding: 22px 20px;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.back-kana-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.back-kana {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.2rem;
  line-height: 1;
  color: var(--ink);
}
.back-romaji {
  font-family: 'Space Mono', monospace;
  font-size: 3rem;
  color: var(--grey);
}
.back-sound-btn {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 30px;
  height: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .85rem;
  margin-left: auto;
  align-self: center;
  transition: background .15s;
}
.back-sound-btn:hover { background: var(--red); color: #fff; }

.words-section { border-top: 1px solid var(--border); padding-top: 12px; }
.words-title {
  font-family: 'Space Mono', monospace;
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 8px;
}
.word-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 6px 10px;
  padding: 5px 0;
  border-bottom: 1px solid var(--cream);
  align-items: baseline;
}
.word-kana {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .9rem;
  font-weight: 700;
}
.word-italian { font-size: 1.3rem; color: var(--ink); font-style: italic; }
.word-pos {
  font-family: 'Space Mono', monospace;
  font-size: 1rem;
  color: var(--grey);
  background: var(--cream);
  padding: 1px 5px;
  border-radius: 2px;
  white-space: nowrap;
}

/* ── NAV BUTTONS ── */
.nav-row {
  display: flex;
  gap: 14px;
  align-items: center;
}
.nav-btn {
  background: var(--ink);
  color: var(--paper);
  border: none;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .18s, transform .15s;
  box-shadow: var(--shadow);
}
.nav-btn:hover { background: var(--red); transform: scale(1.08); }

.flip-hint {
  font-family: 'Cormorant Garamond', serif;
  font-size: .75rem;
  color: var(--grey);
  font-style: italic;
  text-align: center;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header { padding: 10px 14px; }
  .filter-row, .progress-bar-wrap { padding: 8px 14px; }
  .card-area { padding: 20px 14px; }
  .card-wrapper { width: 300px; height: 380px; }
}
</style>

<!-- HEADER -->
<header>
  <div class="header-title">
    ひらがな・カタカナ フラッシュカード
    <span>Flashcard — Edizione Italiana</span>
  </div>
  <div class="header-controls">
    <button class="btn active" id="btn-hiragana" onclick="setScript('hiragana')">ひらがな</button>
    <button class="btn" id="btn-katakana" onclick="setScript('katakana')">カタカナ</button>
    <button class="btn" id="btn-difficult" onclick="toggleDifficult()">⚠️ Difficili</button>
    <button class="btn gold" onclick="shuffle()">⇄ Mescola</button>
    <button class="btn" onclick="reset()">↺ Ricomincia</button>
  </div>
</header>

<!-- FILTER ROW -->
<div class="filter-row">
  <span class="filter-label">Riga:</span>
  <button class="filter-btn active" onclick="setRow('tutti')">Tutti</button>
  <div id="row-filters"></div>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <span class="progress-label" id="progress-label">0 / 0</span>
</div>

<!-- MAIN -->
<div class="main-wrap">
  <!-- Difficult panel -->
  <div class="difficult-panel" id="difficult-panel">
    <div class="panel-header">
      <span>⚠️ Difficili</span>
      <span id="diff-count">0</span>
    </div>
    <div class="panel-list" id="diff-list"></div>
  </div>

  <!-- Card area -->
  <div class="card-area">
    <div class="card-wrapper">
      <div class="card" id="main-card" onclick="flipCard()">
        <!-- FRONT -->
        <div class="card-face card-front">
          <div class="card-front-top">
            <div class="card-svg-wrap" id="card-svg"></div>
            <button class="card-sound-btn" id="sound-front" onclick="event.stopPropagation(); speak()" title="Ascolta">🔊</button>
            <button class="difficult-btn" id="diff-btn" onclick="event.stopPropagation(); toggleDifficultCard()" title="Aggiungi ai difficili">😓</button>
          </div>
          <div class="card-front-bottom">
            <div class="card-romaji" id="card-romaji">—</div>
            <div class="card-stroke-info" id="card-stroke">— tratti</div>
          </div>
        </div>
        <!-- BACK -->
        <div class="card-face card-back">
          <div class="card-face-inner" id="card-back-inner">
            <div class="back-kana-row">
              <div class="back-kana" id="back-kana">—</div>
              <div class="back-romaji" id="back-romaji">—</div>
              <button class="back-sound-btn" onclick="event.stopPropagation(); speak()" title="Ascolta">🔊</button>
            </div>
            <div class="words-section">
              <div class="words-title">Parole correlate</div>
              <div id="word-list"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="navigate(-1)" title="Precedente">◀</button>
      <button class="nav-btn" onclick="flipCard()" title="Gira">↺</button>
      <button class="nav-btn" onclick="navigate(1)" title="Successivo">▶</button>
    </div>
    <div class="flip-hint">Clicca la carta per girare • Usa ← → per navigare</div>
  </div>
</div>

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let currentScript = 'hiragana';
let deck = [];
let currentIndex = 0;
let isFlipped = false;
let difficultSet = new Set(JSON.parse(localStorage.getItem('difficult') || '[]'));
let showOnlyDifficult = false;
let currentRow = 'tutti';

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
function init() {
  buildRowFilters();
  buildDeck();
  renderCard();
  renderDifficultPanel();
}

function buildRowFilters() {
  const container = document.getElementById('row-filters');
  container.innerHTML = '';
  ROWS.forEach(row => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = row.label;
    btn.onclick = () => setRow(row.label);
    container.appendChild(btn);
  });
}

function buildDeck() {
  const allKeys = Object.keys(SVG_IDS[currentScript]);
  let keys;
  if (currentRow === 'tutti') {
    keys = allKeys;
  } else {
    const row = ROWS.find(r => r.label === currentRow);
    keys = row ? row.keys : allKeys;
  }
  if (showOnlyDifficult) {
    keys = keys.filter(k => difficultSet.has(currentScript + ':' + k));
  }
  deck = keys.map(k => ({ key: k }));
  currentIndex = 0;
  isFlipped = false;
}

function setScript(s) {
  currentScript = s;
  document.getElementById('btn-hiragana').classList.toggle('active', s === 'hiragana');
  document.getElementById('btn-katakana').classList.toggle('active', s === 'katakana');
  document.getElementById('main-card').classList.remove('flipped');
  isFlipped = false;
  buildDeck();
  renderCard();
}

function setRow(label) {
  currentRow = label;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === label || (label === 'tutti' && b.textContent === 'Tutti'));
  });
  document.querySelector('.filter-btn.active') || document.querySelector('.filter-btn');
  buildDeck();
  renderCard();
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  currentIndex = 0;
  isFlipped = false;
  document.getElementById('main-card').classList.remove('flipped');
  renderCard();
}

function reset() {
  buildDeck();
  renderCard();
}

function navigate(dir) {
  currentIndex = (currentIndex + dir + deck.length) % deck.length;
  isFlipped = false;
  document.getElementById('main-card').classList.remove('flipped');
  renderCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('main-card').classList.toggle('flipped', isFlipped);
}

function toggleDifficult() {
  showOnlyDifficult = !showOnlyDifficult;
  document.getElementById('btn-difficult').classList.toggle('active', showOnlyDifficult);
  buildDeck();
  renderCard();
}

function toggleDifficultCard() {
  if (deck.length === 0) return;
  const id = currentScript + ':' + deck[currentIndex].key;
  if (difficultSet.has(id)) {
    difficultSet.delete(id);
  } else {
    difficultSet.add(id);
  }
  localStorage.setItem('difficult', JSON.stringify([...difficultSet]));
  updateDiffBtn();
  renderDifficultPanel();
}

function toggleDifficultPanel() {
  document.getElementById('difficult-panel').classList.toggle('open');
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function renderCard() {
  if (deck.length === 0) {
    document.getElementById('card-svg').innerHTML = '<div style="font-size:2rem;color:#888">—</div>';
    document.getElementById('card-romaji').textContent = '—';
    document.getElementById('card-stroke').textContent = '';
    document.getElementById('back-kana').textContent = '—';
    document.getElementById('back-romaji').textContent = '—';
    document.getElementById('word-list').innerHTML = '';
    updateProgress();
    return;
  }

  const item = deck[currentIndex];
  const key = item.key;
  const kana = KANA[currentScript][key];
  const svgId = SVG_IDS[currentScript][key];
  const strokes = STROKES[key] || '—';

  // SVG via Google Drive thumbnail
  const svgUrl = `https://drive.google.com/thumbnail?id=${svgId}&sz=w400`;
  document.getElementById('card-svg').innerHTML =
    `<img src="${svgUrl}" alt="${kana}" style="width:190px;height:190px;object-fit:contain;" loading="eager" />`;

  document.getElementById('card-romaji').textContent = key;
  document.getElementById('card-stroke').textContent = strokes + (strokes === 1 ? ' tratto' : ' tratti');

  // Back
  document.getElementById('back-kana').textContent = kana;
  document.getElementById('back-romaji').textContent = key;

  // Words
  const words = (WORDS[currentScript][key] || []);
  const wl = document.getElementById('word-list');
  wl.innerHTML = words.map(w =>
    `<div class="word-item">
      <span class="word-kana">${w.k}</span>
      <span class="word-italian">${w.it}</span>
      <span class="word-pos">${w.pos}</span>
    </div>`
  ).join('') || '<div style="color:#aaa;font-style:italic;font-size:.8rem">Nessuna parola</div>';

  updateDiffBtn();
  updateProgress();
}

function updateDiffBtn() {
  if (deck.length === 0) return;
  const id = currentScript + ':' + deck[currentIndex].key;
  document.getElementById('diff-btn').textContent = difficultSet.has(id) ? '⭐' : '😓';
}

function updateProgress() {
  const total = deck.length;
  const pos = total > 0 ? currentIndex + 1 : 0;
  const pct = total > 0 ? (pos / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pos + ' / ' + total;
}

function renderDifficultPanel() {
  const list = document.getElementById('diff-list');
  document.getElementById('diff-count').textContent = difficultSet.size;
  const items = [...difficultSet].map(id => {
    const [sc, key] = id.split(':');
    return { sc, key, kana: KANA[sc]?.[key] || '?'};
  });
  list.innerHTML = items.length === 0
    ? '<div style="padding:14px;color:#aaa;font-size:.8rem;font-style:italic">Nessun carattere difficile</div>'
    : items.map(({sc,key,kana}) =>
        `<div class="panel-item" onclick="jumpTo('${sc}','${key}')">
          <span class="panel-kana">${kana}</span>
          <span class="panel-roma">${key}</span>
          <span style="font-size:.65rem;color:#bbb;margin-left:auto">${sc==='hiragana'?'ひ':'カ'}</span>
        </div>`
      ).join('');
}

function jumpTo(sc, key) {
  if (sc !== currentScript) setScript(sc);
  const idx = deck.findIndex(d => d.key === key);
  if (idx >= 0) {
    currentIndex = idx;
    isFlipped = false;
    document.getElementById('main-card').classList.remove('flipped');
    renderCard();
  }
}

// ─────────────────────────────────────────
// SPEECH
// ─────────────────────────────────────────
function speak() {
  if (deck.length === 0) return;
  const key = deck[currentIndex].key;
  const kana = KANA[currentScript][key];
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(kana);
    u.lang = 'ja-JP';
    u.rate = 0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

// ─────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

// ─────────────────────────────────────────
// DIFFICULT PANEL TOGGLE (from header btn)
// ─────────────────────────────────────────
function toggleDifficult() {
  const panel = document.getElementById('difficult-panel');
  const isOpen = panel.classList.contains('open');
  showOnlyDifficult = false; // toggle panel, not filter
  panel.classList.toggle('open', !isOpen);
  document.getElementById('btn-difficult').classList.toggle('active', !isOpen);
}

// ─────────────────────────────────────────
// START
// ─────────────────────────────────────────
init();
</script>
